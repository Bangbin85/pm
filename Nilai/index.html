<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedang Perbaikan</title>
    <!-- Tailwind CSS untuk styling modern dan responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome untuk ikon sesuai permintaan (bukan SVG) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS untuk Animasi Background Berubah Warna -->
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .bg-animated {
            /* Kombinasi warna gelap elegan: abu-abu tua, ungu tua, biru dongker */
            background: linear-gradient(-45deg, #111827, #1e1b4b, #0f172a, #312e81);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
    </style>
</head>
<body class="bg-animated text-white min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-sans">

    <!-- Efek Cahaya Latar Belakang (Blobs) tambahan -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-screen filter blur-[100px] opacity-20 pointer-events-none animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500 rounded-full mix-blend-screen filter blur-[100px] opacity-20 pointer-events-none animate-pulse" style="animation-delay: 2s;"></div>

    <!-- Konten Utama -->
    <div class="z-10 text-center px-6 w-full max-w-md flex flex-col items-center">
        
        <!-- Ikon Perbaikan -->
        <div class="mb-6 animate-bounce">
            <i class="fas fa-tools text-6xl text-blue-400 drop-shadow-[0_0_15px_rgba(96,165,250,0.5)]"></i>
        </div>

        <!-- Teks Utama -->
        <h1 class="text-3xl md:text-4xl font-bold mb-3 tracking-wide">Mohon Maaf</h1>
        <h2 class="text-2xl text-gray-300 font-medium mb-10">Sedang Perbaikan</h2>

        <!-- Card Donasi (Toggle) -->
        <div class="bg-gray-800/60 backdrop-blur-xl border border-gray-700/50 p-6 rounded-2xl shadow-2xl w-full text-left transition-transform hover:-translate-y-1 duration-300">
            <!-- Header Toggle -->
            <button id="donasi-toggle" class="w-full flex items-center justify-between focus:outline-none group">
                <div class="flex items-center gap-3 text-left">
                    <i class="fas fa-hand-holding-heart text-pink-500 text-xl group-hover:scale-110 transition-transform"></i>
                    <!-- Judul diubah sesuai permintaan -->
                    <h3 class="text-lg md:text-xl font-semibold tracking-wide">Donasi untuk pengembangan</h3>
                </div>
                <i id="donasi-chevron" class="fas fa-chevron-down text-gray-400 transition-transform duration-300 ml-2"></i>
            </button>
            
            <!-- Konten Donasi (Tersembunyi secara default) -->
            <div id="donasi-content" class="max-h-0 overflow-hidden transition-all duration-500 ease-in-out opacity-0">
                <div class="pt-5 mt-4 border-t border-gray-700/80">
                    <!-- Struktur BNI -->
                    <div class="mb-5">
                        <p class="text-sm text-gray-400 mb-2 font-medium">BNI (Bank Negara Indonesia)</p>
                        <div class="flex items-center bg-gray-900/80 border border-gray-800 rounded-lg p-3 group/item">
                            <p id="bni-account" class="flex-grow text-xl font-mono text-blue-300 tracking-wider">0430267613</p>
                            <button class="copy-btn ml-4 text-gray-500 hover:text-white transition-colors duration-200" data-copy-target="bni-account" title="Salin Nomor Rekening">
                                <i class="fas fa-copy text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Struktur E-Wallet -->
                    <div>
                        <p class="text-sm text-gray-400 mb-2 font-medium">OVO / ShopeePay / GoPay</p>
                        <div class="flex items-center bg-gray-900/80 border border-gray-800 rounded-lg p-3 group/item">
                            <p id="ewallet-number" class="flex-grow text-xl font-mono text-blue-300 tracking-wider">081310051985</p>
                            <button class="copy-btn ml-4 text-gray-500 hover:text-white transition-colors duration-200" data-copy-target="ewallet-number" title="Salin Nomor">
                                <i class="fas fa-copy text-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ikon WhatsApp di Tengah Bawah -->
    <a href="https://wa.me/6281310051985?text=Saya%20dari%20SDN.....%20Kota%20....." target="_blank" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 text-green-500 hover:text-green-400 transition-all duration-300 hover:scale-[1.5] hover:-translate-y-2 z-50 flex flex-col items-center gap-2 group">
        <i class="fab fa-whatsapp text-2xl drop-shadow-[0_4px_10px_rgba(34,197,94,0.4)]"></i>
        <!-- Teks kecil yang muncul saat kursor mendekat -->
        <span class="text-xs font-semibold bg-gray-800 text-white px-3 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-300 shadow-lg border border-gray-700">Hubungi Kami</span>
    </a>

    <!-- Notifikasi Toast (Pengganti Alert) -->
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 border border-green-500/50 text-white px-6 py-3 rounded-full shadow-[0_0_20px_rgba(34,197,94,0.2)] opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-3">
        <i class="fas fa-check-circle text-green-500 text-xl"></i>
        <span class="font-medium">Nomor berhasil disalin!</span>
    </div>

    <script>
        // Logika Toggle Donasi
        const donasiToggle = document.getElementById('donasi-toggle');
        const donasiContent = document.getElementById('donasi-content');
        const donasiChevron = document.getElementById('donasi-chevron');

        donasiToggle.addEventListener('click', () => {
            if (donasiContent.classList.contains('max-h-0')) {
                donasiContent.classList.remove('max-h-0', 'opacity-0');
                donasiContent.classList.add('max-h-[500px]', 'opacity-100');
                donasiChevron.classList.add('rotate-180');
            } else {
                donasiContent.classList.add('max-h-0', 'opacity-0');
                donasiContent.classList.remove('max-h-[500px]', 'opacity-100');
                donasiChevron.classList.remove('rotate-180');
            }
        });

        // Logika Copy
        const copyBtns = document.querySelectorAll('.copy-btn');
        const toast = document.getElementById('toast');

        copyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-copy-target');
                const targetElement = document.getElementById(targetId);
                
                if (!targetElement) return;

                const tempTextArea = document.createElement('textarea');
                tempTextArea.value = targetElement.innerText;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                document.execCommand('copy');
                document.body.removeChild(tempTextArea);

                const icon = btn.querySelector('i');
                icon.classList.remove('fa-copy');
                icon.classList.add('fa-check', 'text-green-400');

                toast.classList.remove('opacity-0');
                toast.classList.add('opacity-100');

                setTimeout(() => {
                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0');
                    
                    setTimeout(() => {
                        icon.classList.remove('fa-check', 'text-green-400');
                        icon.classList.add('fa-copy');
                    }, 300);
                }, 2500);
            });
        });
    </script>
</body>
</html>
